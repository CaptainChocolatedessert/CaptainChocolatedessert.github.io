<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="theme-color" content="#000000" />
<title>Pac-Man</title>
<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: #000;
  }
  #hud {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: max(8px, env(safe-area-inset-top)) 14px 8px 14px;
    color: #ffd400;
    font-weight: bold;
    font-size: 16px;
    letter-spacing: 1px;
  }
  #hud .lives { color: #fff; font-size: 14px; letter-spacing: 3px; }
  #stage {
    flex: 1 1 auto;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  canvas#game {
    display: block;
    background: #000;
    image-rendering: pixelated;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    background: rgba(0,0,0,0.78);
    color: #fff;
    text-align: center;
    padding: 24px;
  }
  #overlay.show { display: flex; }
  #overlay h1 {
    color: #ffd400;
    font-size: clamp(24px, 7vw, 42px);
    margin: 0;
    letter-spacing: 2px;
  }
  #overlay p {
    margin: 0;
    font-size: clamp(14px, 4vw, 18px);
    opacity: 0.85;
  }
  #overlay button {
    margin-top: 8px;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: bold;
    color: #000;
    background: #ffd400;
    border: none;
    border-radius: 24px;
    letter-spacing: 1px;
  }
  #controls {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 64px 64px 64px;
    grid-template-rows: 64px 64px 64px;
    gap: 4px;
    justify-content: center;
    padding: 6px 0 max(10px, env(safe-area-inset-bottom)) 0;
    margin: 0 auto;
  }
  #controls button {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    border: none;
    background: #1c1c2e;
    color: #ffd400;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }
  #controls button:active { background: #34345a; }
  #controls .empty { background: transparent; }
  #btnUp { grid-column: 2; grid-row: 1; }
  #btnLeft { grid-column: 1; grid-row: 2; }
  #btnDown { grid-column: 2; grid-row: 3; }
  #btnRight { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div>SCORE <span id="score">0</span></div>
    <div>LEVEL <span id="level">1</span></div>
    <div class="lives" id="lives">●●●</div>
  </div>

  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay" class="show">
      <h1 id="overlayTitle">PAC-MAN</h1>
      <p id="overlaySub">Swipe or use the arrows to move.<br>Eat all the dots, dodge the ghosts.</p>
      <button id="overlayBtn">TAP TO START</button>
    </div>
  </div>

  <div id="controls">
    <button class="empty"></button><button id="btnUp">&#9650;</button><button class="empty"></button>
    <button id="btnLeft">&#9664;</button><button class="empty"></button><button id="btnRight">&#9654;</button>
    <button class="empty"></button><button id="btnDown">&#9660;</button><button class="empty"></button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- Maze data ----------
  // '#' wall, '.' pellet, 'o' power pellet, ' ' open floor (no pellet)
  // Authentic recreation of the original 1980 Pac-Man arcade maze layout.
  var MAZE = [
    "############################",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#o####.#####.##.#####.####o#",
    "#.####.#####.##.#####.####.#",
    "#..........................#",
    "#.####.##.########.##.####.#",
    "#.####.##.########.##.####.#",
    "#......##....##....##......#",
    "######.#####.##.#####.######",
    "######.#####.##.#####.######",
    "######.##..........##.######",
    "######.##.###  ###.##.######",
    "######.##.#      #.##.######",
    "..........#      #..........",
    "######.##.#      #.##.######",
    "######.##.########.##.######",
    "######.##..........##.######",
    "######.##.########.##.######",
    "######.##.########.##.######",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#.####.#####.##.#####.####.#",
    "#o..##................##..o#",
    "###.##.##.########.##.##.###",
    "###.##.##.########.##.##.###",
    "#......##....##....##......#",
    "#.##########.##.##########.#",
    "#.##########.##.##########.#",
    "#..........................#",
    "############################"
  ];
  var ROWS = MAZE.length;
  var COLS = MAZE[0].length;
  var PACMAN_START = { x: 13, y: 23 };
  var GHOST_HOUSE = { x: 13, y: 14 };
  var GHOST_SPAWNS = [
    { x: 13, y: 14 },
    { x: 14, y: 14 },
    { x: 12, y: 14 },
    { x: 15, y: 14 }
  ];

  function wrapCol(c) { return ((c % COLS) + COLS) % COLS; }
  function tileAt(r, c) {
    if (r < 0 || r >= ROWS) return '#';
    return MAZE[r][wrapCol(c)];
  }
  function isWall(r, c) { return tileAt(r, c) === '#'; }

  // ---------- Canvas / sizing ----------
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var stage = document.getElementById('stage');
  var cell = 20;

  function resize() {
    var availW = stage.clientWidth;
    var availH = stage.clientHeight;
    cell = Math.floor(Math.min(availW / COLS, availH / ROWS));
    cell = Math.max(cell, 8);
    var dpr = window.devicePixelRatio || 1;
    canvas.style.width = (cell * COLS) + 'px';
    canvas.style.height = (cell * ROWS) + 'px';
    canvas.width = Math.round(cell * COLS * dpr);
    canvas.height = Math.round(cell * ROWS * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', resize);

  // ---------- Game state ----------
  var pellets; // grid copy, mutated as eaten
  var pelletsRemaining;
  var score, level, lives;
  var running = false;
  var frightenedTimer = 0;
  var FRIGHTENED_TIME = 7;

  var DIRS = {
    up: { dx: 0, dy: -1 },
    down: { dx: 0, dy: 1 },
    left: { dx: -1, dy: 0 },
    right: { dx: 1, dy: 0 },
    none: { dx: 0, dy: 0 }
  };

  function freshPellets() {
    var g = [];
    for (var r = 0; r < ROWS; r++) {
      g.push(MAZE[r].split(''));
    }
    return g;
  }

  function countPellets(g) {
    var n = 0;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (g[r][c] === '.' || g[r][c] === 'o') n++;
      }
    }
    return n;
  }

  var pacman, ghosts;

  function makePacman() {
    return {
      x: PACMAN_START.x, y: PACMAN_START.y,
      dir: DIRS.none, nextDir: DIRS.none,
      speed: 6.0,
      mouthPhase: 0,
      alive: true
    };
  }

  var GHOST_COLORS = ['#ff3b30', '#ff8fd0', '#34c9eb', '#ffa632'];

  function makeGhosts() {
    return GHOST_SPAWNS.map(function (sp, i) {
      return {
        id: i,
        x: sp.x, y: sp.y,
        spawn: sp,
        dir: DIRS.left,
        speed: 4.6 + level * 0.12,
        state: 'chase', // 'chase' | 'frightened' | 'eaten'
        color: GHOST_COLORS[i],
        releaseDelay: i * 1.2
      };
    });
  }

  function resetLevel(newLevel) {
    level = newLevel;
    pellets = freshPellets();
    pelletsRemaining = countPellets(pellets);
    pacman = makePacman();
    ghosts = makeGhosts();
    frightenedTimer = 0;
  }

  function resetGame() {
    score = 0;
    lives = 3;
    resetLevel(1);
    updateHud();
  }

  function resetPositionsAfterDeath() {
    pacman.x = PACMAN_START.x; pacman.y = PACMAN_START.y;
    pacman.dir = DIRS.none; pacman.nextDir = DIRS.none;
    ghosts = makeGhosts();
    frightenedTimer = 0;
  }

  // ---------- Input ----------
  var pendingDir = DIRS.none;
  function setDir(name) { pendingDir = DIRS[name]; }

  function bindHold(el, name) {
    var fire = function (e) { e.preventDefault(); setDir(name); };
    el.addEventListener('pointerdown', fire);
    el.addEventListener('touchstart', fire, { passive: false });
  }
  bindHold(document.getElementById('btnUp'), 'up');
  bindHold(document.getElementById('btnDown'), 'down');
  bindHold(document.getElementById('btnLeft'), 'left');
  bindHold(document.getElementById('btnRight'), 'right');

  window.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowUp' || e.key === 'w') setDir('up');
    else if (e.key === 'ArrowDown' || e.key === 's') setDir('down');
    else if (e.key === 'ArrowLeft' || e.key === 'a') setDir('left');
    else if (e.key === 'ArrowRight' || e.key === 'd') setDir('right');
  });

  // swipe on canvas / stage
  var touchStart = null;
  stage.addEventListener('touchstart', function (e) {
    var t = e.changedTouches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  stage.addEventListener('touchend', function (e) {
    if (!touchStart) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStart.x;
    var dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 16 && Math.abs(dy) < 16) { touchStart = null; return; }
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 'right' : 'left');
    else setDir(dy > 0 ? 'down' : 'up');
    touchStart = null;
  }, { passive: true });

  // ---------- Movement helpers ----------
  // Entities always start exactly on an integer tile coordinate. Each call moves
  // the entity forward in whole "legs", never advancing past the next tile
  // center in one piece, so a turn decision can never be skipped over and the
  // entity never gets re-snapped backwards mid-tile.
  var TINY = 1e-6;

  function canEnter(tileR, tileC, dir) {
    var nr = tileR + dir.dy, nc = tileC + dir.dx;
    return tileAt(nr, nc) !== '#';
  }

  function isAtCenter(e) {
    return Math.abs(e.x - Math.round(e.x)) < TINY && Math.abs(e.y - Math.round(e.y)) < TINY;
  }

  function distToNextCenter(e) {
    if (isAtCenter(e)) return 1; // fresh leg: next center is a full tile away
    if (e.dir.dx === 1) return Math.ceil(e.x - TINY) - e.x;
    if (e.dir.dx === -1) return e.x - Math.floor(e.x + TINY);
    if (e.dir.dy === 1) return Math.ceil(e.y - TINY) - e.y;
    if (e.dir.dy === -1) return e.y - Math.floor(e.y + TINY);
    return 0;
  }

  // moves `e` by speed*dt tiles, calling decide(tileR, tileC) every time it
  // lands exactly on a tile center so direction can be (re)chosen there.
  function moveAlongGrid(e, dt, decide) {
    var remaining = e.speed * dt;
    var guard = 0;
    while (remaining > TINY && guard < 8) {
      guard++;
      if (isAtCenter(e)) {
        e.x = Math.round(e.x); e.y = Math.round(e.y);
        decide(e.y, e.x);
      }
      if (e.dir === DIRS.none) break;
      var step = Math.min(remaining, distToNextCenter(e));
      e.x += e.dir.dx * step;
      e.y += e.dir.dy * step;
      remaining -= step;
      if (e.x < 0) e.x += COLS;
      if (e.x >= COLS) e.x -= COLS;
    }
  }

  function updatePacman(dt) {
    var p = pacman;
    if (pendingDir !== DIRS.none) p.nextDir = pendingDir;

    moveAlongGrid(p, dt, function (tileR, tileC) {
      if (p.nextDir !== DIRS.none && canEnter(tileR, tileC, p.nextDir)) {
        p.dir = p.nextDir;
      } else if (!canEnter(tileR, tileC, p.dir)) {
        p.dir = DIRS.none;
      }
    });
    p.mouthPhase += dt * 10;

    // eat pellets
    var pr = Math.round(p.y), pc = wrapCol(Math.round(p.x));
    if (Math.abs(p.x - pc) < 0.3 && Math.abs(p.y - pr) < 0.3) {
      var t = pellets[pr][pc];
      if (t === '.' || t === 'o') {
        pellets[pr][pc] = ' ';
        pelletsRemaining--;
        if (t === '.') {
          score += 10;
        } else {
          score += 50;
          frightenedTimer = FRIGHTENED_TIME;
          ghosts.forEach(function (g) {
            if (g.state !== 'eaten') {
              g.state = 'frightened';
              g.dir = reverseDir(g.dir);
            }
          });
        }
        updateHud();
        if (pelletsRemaining <= 0) {
          levelClear();
        }
      }
    }
  }

  function reverseDir(d) {
    if (d === DIRS.up) return DIRS.down;
    if (d === DIRS.down) return DIRS.up;
    if (d === DIRS.left) return DIRS.right;
    if (d === DIRS.right) return DIRS.left;
    return DIRS.none;
  }

  function dist2(x1, y1, x2, y2) {
    var dx = x1 - x2, dy = y1 - y2;
    return dx * dx + dy * dy;
  }

  // Ghost-house interior + door, so ghosts can be steered out through the
  // single door column instead of greedily chasing Pac-Man from inside the box.
  var HOUSE_BOUNDS = { r0: 12, r1: 15, c0: 11, c1: 16 };
  function isInHouse(r, c) {
    return r >= HOUSE_BOUNDS.r0 && r <= HOUSE_BOUNDS.r1 && c >= HOUSE_BOUNDS.c0 && c <= HOUSE_BOUNDS.c1;
  }

  function bestTowards(opts, tile, targetX, targetY) {
    var best = opts[0], bestD = Infinity;
    opts.forEach(function (d) {
      var nx = tile.c + d.dx, ny = tile.r + d.dy;
      var dd = dist2(nx, ny, targetX, targetY);
      if (dd < bestD) { bestD = dd; best = d; }
    });
    return best;
  }

  function chooseGhostDir(g, tile) {
    var opts = [];
    for (var name in DIRS) {
      var d = DIRS[name];
      if (d === DIRS.none) continue;
      if (d === reverseDir(g.dir) && hasOtherOption(g, tile)) continue;
      if (canEnter(tile.r, tile.c, d)) opts.push(d);
    }
    if (opts.length === 0) {
      var rev = reverseDir(g.dir);
      if (canEnter(tile.r, tile.c, rev)) return rev;
      return DIRS.none;
    }

    if (g.state !== 'eaten' && isInHouse(tile.r, tile.c)) {
      return bestTowards(opts, tile, GHOST_HOUSE.x, HOUSE_BOUNDS.r0 - 3);
    }

    if (g.state === 'frightened') {
      return opts[Math.floor(Math.random() * opts.length)];
    }

    var targetX, targetY;
    if (g.state === 'eaten') {
      targetX = GHOST_HOUSE.x; targetY = GHOST_HOUSE.y;
    } else if (g.id === 1) {
      // pink: ambush a few tiles ahead of pacman
      targetX = pacman.x + pacman.dir.dx * 4;
      targetY = pacman.y + pacman.dir.dy * 4;
    } else if (g.id === 2 && Math.random() < 0.3) {
      targetX = Math.random() * COLS; targetY = Math.random() * ROWS;
    } else if (g.id === 3) {
      var d2 = dist2(g.x, g.y, pacman.x, pacman.y);
      if (d2 < 64) { targetX = 1; targetY = ROWS - 2; }
      else { targetX = pacman.x; targetY = pacman.y; }
    } else {
      targetX = pacman.x; targetY = pacman.y;
    }

    return bestTowards(opts, tile, targetX, targetY);
  }

  function hasOtherOption(g, tile) {
    var count = 0;
    for (var name in DIRS) {
      var d = DIRS[name];
      if (d === DIRS.none) continue;
      if (canEnter(tile.r, tile.c, d)) count++;
    }
    return count > 1;
  }

  function updateGhost(g, dt, gameTime) {
    if (g.releaseDelay > 0) {
      g.releaseDelay -= dt;
      return;
    }
    if (g.state === 'frightened' && frightenedTimer <= 0) g.state = 'chase';

    var speed = g.speed;
    if (g.state === 'frightened') speed = g.speed * 0.55;
    if (g.state === 'eaten') speed = g.speed * 1.7;

    var savedSpeed = g.speed;
    g.speed = speed;
    moveAlongGrid(g, dt, function (tileR, tileC) {
      var tile = { r: tileR, c: tileC };
      if (g.state === 'eaten' && tileC === GHOST_HOUSE.x && tileR === GHOST_HOUSE.y) {
        g.state = 'chase';
        g.x = g.spawn.x; g.y = g.spawn.y;
        tile = { r: g.spawn.y, c: g.spawn.x };
      }
      var nd = chooseGhostDir(g, tile);
      if (nd !== DIRS.none) g.dir = nd;
    });
    g.speed = savedSpeed;
  }

  function levelClear() {
    running = false;
    showOverlay('LEVEL ' + level + ' CLEAR!', 'Score: ' + score, 'NEXT LEVEL', function () {
      resetLevel(level + 1);
      updateHud();
      hideOverlay();
      running = true;
    });
  }

  function loseLife() {
    lives--;
    updateHud();
    if (lives <= 0) {
      running = false;
      showOverlay('GAME OVER', 'Score: ' + score, 'TRY AGAIN', function () {
        resetGame();
        hideOverlay();
        running = true;
      });
    } else {
      resetPositionsAfterDeath();
    }
  }

  function checkCollisions() {
    ghosts.forEach(function (g) {
      if (g.releaseDelay > 0) return;
      var d = dist2(pacman.x, pacman.y, g.x, g.y);
      if (d < 0.36) {
        if (g.state === 'frightened') {
          g.state = 'eaten';
          score += 200;
          updateHud();
        } else if (g.state === 'chase') {
          loseLife();
        }
      }
    });
  }

  // ---------- HUD ----------
  var scoreEl = document.getElementById('score');
  var levelEl = document.getElementById('level');
  var livesEl = document.getElementById('lives');
  function updateHud() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    livesEl.textContent = '●'.repeat(Math.max(lives, 0));
  }

  // ---------- Overlay ----------
  var overlay = document.getElementById('overlay');
  var overlayTitle = document.getElementById('overlayTitle');
  var overlaySub = document.getElementById('overlaySub');
  var overlayBtn = document.getElementById('overlayBtn');
  var overlayAction = null;

  function showOverlay(title, sub, btnText, action) {
    overlayTitle.textContent = title;
    overlaySub.textContent = sub;
    overlayBtn.textContent = btnText;
    overlayAction = action;
    overlay.classList.add('show');
  }
  function hideOverlay() { overlay.classList.remove('show'); }
  overlayBtn.addEventListener('click', function () {
    if (overlayAction) overlayAction();
  });

  // ---------- Rendering ----------
  function drawMaze() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, COLS * cell, ROWS * cell);

    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var t = MAZE[r][c];
        if (t === '#') {
          ctx.fillStyle = '#1c1cb0';
          var pad = Math.max(1, cell * 0.06);
          roundRect(c * cell + pad, r * cell + pad, cell - pad * 2, cell - pad * 2, cell * 0.25);
          ctx.fill();
        }
      }
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawPellets(time) {
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var t = pellets[r][c];
        var cx = c * cell + cell / 2, cy = r * cell + cell / 2;
        if (t === '.') {
          ctx.fillStyle = '#ffd9a8';
          ctx.beginPath();
          ctx.arc(cx, cy, Math.max(1.5, cell * 0.07), 0, Math.PI * 2);
          ctx.fill();
        } else if (t === 'o') {
          var pulse = 0.65 + 0.35 * Math.sin(time * 6);
          ctx.fillStyle = '#ffd9a8';
          ctx.beginPath();
          ctx.arc(cx, cy, cell * 0.22 * pulse + cell * 0.08, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  function drawPacman(time) {
    var cx = (pacman.x + 0.5) * cell, cy = (pacman.y + 0.5) * cell;
    var r = cell * 0.42;
    var angle = 0;
    if (pacman.dir === DIRS.up) angle = -Math.PI / 2;
    else if (pacman.dir === DIRS.down) angle = Math.PI / 2;
    else if (pacman.dir === DIRS.left) angle = Math.PI;
    else angle = 0;

    var mouth = Math.abs(Math.sin(pacman.mouthPhase)) * 0.28 + 0.04;
    ctx.fillStyle = '#ffd400';
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, r, mouth * Math.PI, (2 - mouth) * Math.PI);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawGhost(g) {
    var cx = (g.x + 0.5) * cell, cy = (g.y + 0.5) * cell;
    var r = cell * 0.42;

    if (g.state === 'eaten') {
      drawEyes(cx, cy, r, g.dir);
      return;
    }

    var color = g.color;
    if (g.state === 'frightened') {
      color = (frightenedTimer < 2 && Math.floor(frightenedTimer * 6) % 2 === 0) ? '#fff' : '#2222ee';
    }

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy - r * 0.1, r, Math.PI, 0, false);
    ctx.lineTo(cx + r, cy + r * 0.7);
    var waves = 4;
    for (var i = 0; i < waves; i++) {
      var x0 = cx + r - (i * 2 + 1) * (r * 2 / (waves * 2));
      var x1 = cx + r - (i * 2 + 2) * (r * 2 / (waves * 2));
      ctx.quadraticCurveTo(x0, cy + r * (i % 2 === 0 ? 1.1 : 0.5), x1, cy + r * 0.7);
    }
    ctx.lineTo(cx - r, cy + r * 0.7);
    ctx.closePath();
    ctx.fill();

    if (g.state !== 'frightened') {
      drawEyes(cx, cy, r, g.dir);
    } else {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - r * 0.35, cy - r * 0.05, r * 0.18, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + r * 0.35, cy - r * 0.05, r * 0.18, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawEyes(cx, cy, r, dir) {
    var ox = dir.dx * r * 0.25, oy = dir.dy * r * 0.25;
    [-1, 1].forEach(function (s) {
      var ex = cx + s * r * 0.32, ey = cy - r * 0.12;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex, ey, r * 0.22, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#1133aa';
      ctx.beginPath(); ctx.arc(ex + ox * 0.6, ey + oy * 0.6, r * 0.11, 0, Math.PI * 2); ctx.fill();
    });
  }

  function render(time) {
    drawMaze();
    drawPellets(time);
    drawPacman(time);
    ghosts.forEach(drawGhost);
  }

  // ---------- Main loop ----------
  var STEP = 1 / 60;
  var acc = 0;
  var lastTime = null;
  var gameTime = 0;

  function update(dt) {
    gameTime += dt;
    if (frightenedTimer > 0) {
      frightenedTimer -= dt;
      if (frightenedTimer <= 0) {
        frightenedTimer = 0;
        ghosts.forEach(function (g) { if (g.state === 'frightened') g.state = 'chase'; });
      }
    }
    updatePacman(dt);
    ghosts.forEach(function (g) { updateGhost(g, dt, gameTime); });
    checkCollisions();
  }

  function frame(now) {
    requestAnimationFrame(frame);
    if (lastTime === null) lastTime = now;
    var dt = (now - lastTime) / 1000;
    lastTime = now;
    if (dt > 0.25) dt = 0.25;

    if (running) {
      acc += dt;
      var steps = 0;
      while (acc >= STEP && steps < 5) {
        update(STEP);
        acc -= STEP;
        steps++;
      }
    }
    render(gameTime);
  }

  // ---------- Boot ----------
  resetGame();
  resize();
  showOverlay('PAC-MAN', 'Swipe or use the arrows to move.\nEat all the dots, dodge the ghosts.', 'TAP TO START', function () {
    resetGame();
    hideOverlay();
    running = true;
  });
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
