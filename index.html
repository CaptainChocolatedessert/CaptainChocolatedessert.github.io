<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Character Sheet</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;

      background: #cdbb8c;
      font-family: sans-serif;
    }

    .topbar {
      height: 42px;

      display: flex;
      align-items: center;
      gap: 12px;

      padding: 0 12px;

      background: #5a4630;
      color: #f4ead0;

      border-bottom: 2px solid #3d2f20;

      box-sizing: border-box;
    }

    .title {
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .sheet-frame {
      width: 100%;
      height: calc(100vh - 42px);
      border: none;
    }

    a {
      color: #f4ead0;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="title">Character Sheet d</div>

    <a
      href="https://docs.google.com/spreadsheets/d/16zuPQg-qPmdnoQzfaLUSf9jiFGf8DAFruRGge5j3-aM/edit?usp=sharing"
      target="_blank"
    >
      Open Full Sheet
    </a>
  </div>

  <iframe
    class="sheet-frame"
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSz9X0g9neBJPWBnhRbFExc4V_bEXYTgOmrRQ44JO8uRTqXe86bcarQp2LTBEH3phRXGdSIrlifq-8d/pubhtml?widget=true&amp;headers=false"
    allowfullscreen
  ></iframe>
  
</body>
</html>
