  const s = levels[lvlIdx].start;

  player.vx = 0; player.vy = 0;
  player.grounded = false; player.coyote = 0; player.buffer = 0;

// ─── Audio ───────────────────────────────────────────────────────────────────
let _ac = null;
function ac() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}
function tone(freq, type, vol, dur, freqEnd, delay) {
  const c = ac(), t = c.currentTime + (delay || 0);
  const o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.01);
}
function playJump()  { tone(220, 'square',   0.18, 0.13, 550); }
function playLand()  { tone(120, 'sine',     0.20, 0.07, 40); }
function playDeath() { tone(380, 'sawtooth', 0.22, 0.35, 60); }
function playFlag()  { [523,659,784,1047].forEach((f,i) => tone(f,'square',0.18,0.18,null,i*0.11)); }
function playWin()   { [523,659,784,659,784,1047].forEach((f,i) => tone(f,'square',0.18,0.18,null,[0,.15,.30,.45,.55,.65][i])); }

const BG_BEAT   = 0.15;   // seconds per note (~100 BPM feel)
const BG_VOL    = 0.055;
const BG_MELODY = [523,659,784,659, 523,440,392,440, 523,659,784,880, 784,659,523,392];
const BG_BASS   = [130,  0,  0,  0, 196,  0,  0,  0, 130,  0,  0,  0, 196,  0,  0,  0];
let bgMasterGain   = null;
let bgLoopTimeout  = null;
let bgMusicStarted = false;

function getBgGain() {
  if (!bgMasterGain) {
    const a = ac();
    bgMasterGain = a.createGain();
    bgMasterGain.gain.setValueAtTime(1, a.currentTime);
    bgMasterGain.connect(a.destination);
  }
  return bgMasterGain;
}

function scheduleBgLoop(startTime) {
  const a = ac(), mg = getBgGain();
  for (let i = 0; i < BG_MELODY.length; i++) {
    const t = startTime + i * BG_BEAT;
    const om = a.createOscillator(), gm = a.createGain();
    om.connect(gm); gm.connect(mg);
    om.type = 'square';
    om.frequency.setValueAtTime(BG_MELODY[i], t);
    gm.gain.setValueAtTime(BG_VOL, t);
    gm.gain.exponentialRampToValueAtTime(0.0001, t + BG_BEAT * 0.82);
    om.start(t); om.stop(t + BG_BEAT);
    if (BG_BASS[i] > 0) {
      const ob = a.createOscillator(), gb = a.createGain();
      ob.connect(gb); gb.connect(mg);
      ob.type = 'triangle';
      ob.frequency.setValueAtTime(BG_BASS[i], t);
      gb.gain.setValueAtTime(BG_VOL * 1.1, t);
      gb.gain.exponentialRampToValueAtTime(0.0001, t + BG_BEAT * 3.8);
      ob.start(t); ob.stop(t + BG_BEAT * 4);
    }
  }
  return startTime + BG_MELODY.length * BG_BEAT;
}

function scheduleBgNext(nextStart) {
  const end = scheduleBgLoop(nextStart);
  const delay = (end - ac().currentTime - 0.3) * 1000;
  bgLoopTimeout = setTimeout(() => scheduleBgNext(end), Math.max(50, delay));
}

function startBgMusic() {
  if (bgMusicStarted) return;
  bgMusicStarted = true;
  scheduleBgNext(ac().currentTime);
}

function setBgMusicVolume(vol) {
  getBgGain().gain.setTargetAtTime(vol, ac().currentTime, 0.05);
}

// ─── Input ───────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  e.preventDefault();
  ac(); // ensure AudioContext is running after first gesture
  keys[e.code] = true;
  if (phase === 'title') { startBgMusic(); phase = 'playing'; return; }
  if (phase === 'charSelect')  { if (e.code === 'Escape') phase = 'paused'; return; }
  if (phase === 'colorSelect') { if (e.code === 'Escape') phase = 'paused'; return; }
  if (e.code === 'Escape') {
    if (phase === 'playing') { phase = 'paused'; setBgMusicVolume(0); return; }
    if (phase === 'paused')  { phase = 'playing'; setBgMusicVolume(1); return; }
  }
  if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
    if (phase === 'playing') player.buffer = BUFFER_MS;
  }
  if (phase === 'complete' && completeTimer <= 0) advanceLevel();
  if (phase === 'win') { lvlIdx = 0; phase = 'playing'; resetPlayer(); }
}, { passive: false });
window.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) * (W / rect.width);
  const cy = (e.clientY - rect.top)  * (H / rect.height);

  if (phase === 'title') { startBgMusic(); phase = 'playing'; return; }

  if (phase === 'colorSelect') {
    const SWATCH = 34, GAP = 3;
    const PLAT_COLS = 8, GROUND_COLS = 6, SPIKE_COLS = 6;
    const platStartX   = Math.round((W - (PLAT_COLS   * SWATCH + (PLAT_COLS   - 1) * GAP)) / 2);
    const groundStartX = Math.round((W - (GROUND_COLS * SWATCH + (GROUND_COLS - 1) * GAP)) / 2);
    const spikeStartX  = groundStartX;
    const ROW_H = SWATCH + GAP;
    const platStartY    = 50;
    const groundHeaderY = platStartY + 2 * ROW_H + 12;
    const groundStartY  = groundHeaderY + 14;
    const spikeHeaderY  = groundStartY + 2 * ROW_H + 12;
    const spikeStartY   = spikeHeaderY + 14;
    const backY         = spikeStartY  + 2 * ROW_H + 14;

    if (cx >= W/2 - 80 && cx < W/2 + 80 && cy >= backY && cy < backY + 30) {
      phase = 'paused'; return;
    }
    function hitSwatch(opts, cols, startX, startY) {
      for (let i = 0; i < opts.length; i++) {
        const sx = startX + (i % cols) * (SWATCH + GAP);
        const sy = startY + Math.floor(i / cols) * ROW_H;
        if (cx >= sx && cx < sx + SWATCH && cy >= sy && cy < sy + SWATCH) return i;
      }
      return -1;
    }
    let idx;
    if ((idx = hitSwatch(PLATFORM_COLOR_OPTIONS, PLAT_COLS, platStartX, platStartY)) >= 0) {
      customPlatformColor = PLATFORM_COLOR_OPTIONS[idx]; return;
    }
    if ((idx = hitSwatch(GROUND_COLOR_OPTIONS, GROUND_COLS, groundStartX, groundStartY)) >= 0) {
      customGroundColor = GROUND_COLOR_OPTIONS[idx]; return;
    }
    if ((idx = hitSwatch(SPIKE_COLOR_OPTIONS, SPIKE_COLS, spikeStartX, spikeStartY)) >= 0) {
      customSpikeColor = SPIKE_COLOR_OPTIONS[idx]; return;
    }
    return;
  }

  if (phase === 'charSelect') {
    const CELL = 42, GAP = 4, COLS = 10;
    const gridLeft = (W - (COLS * CELL + (COLS - 1) * GAP)) / 2;
    const STOP = 50, SVH = 350;
    // Back button
    if (cx >= W/2 - 80 && cx < W/2 + 80 && cy >= 404 && cy < 440) {
      phase = 'paused'; return;
    }
    // Emoji click inside scroll area
    if (cy >= STOP && cy < STOP + SVH) {
      const adjY = cy - STOP + charSelectScroll;
      const col  = Math.floor((cx - gridLeft) / (CELL + GAP));
      const row  = Math.floor(adjY / (CELL + GAP));
      const lx   = (cx - gridLeft) % (CELL + GAP);
      const ly   = adjY % (CELL + GAP);
      const idx  = row * COLS + col;
      if (col >= 0 && col < COLS && lx < CELL && ly < CELL && idx >= 0 && idx < EMOJI_OPTIONS.length)
        playerEmoji = EMOJI_OPTIONS[idx];
    }
    return;
  }

  if (phase === 'playing' || phase === 'paused') {
    if (cx >= PAUSE_BTN.x && cx < PAUSE_BTN.x + PAUSE_BTN.w &&
        cy >= PAUSE_BTN.y && cy < PAUSE_BTN.y + PAUSE_BTN.h) {
      const next = phase === 'playing' ? 'paused' : 'playing';
      setBgMusicVolume(next === 'playing' ? 1 : 0);
      phase = next;
      return;
    }
  }
  if (phase === 'paused') {
    if (cx >= CHAR_BTN.x && cx < CHAR_BTN.x + CHAR_BTN.w &&
        cy >= CHAR_BTN.y && cy < CHAR_BTN.y + CHAR_BTN.h) {
      // Scroll to selected emoji when opening
      const CELL = 42, GAP = 4, COLS = 10, SVH = 350;
      const ROWS = Math.ceil(EMOJI_OPTIONS.length / COLS);
      const totalH = ROWS * (CELL + GAP) - GAP;
      const maxS = Math.max(0, totalH - SVH);
      const selRow = Math.floor(EMOJI_OPTIONS.indexOf(playerEmoji) / COLS);
      charSelectScroll = Math.min(maxS, Math.max(0, selRow * (CELL + GAP) - SVH / 2 + CELL / 2));
      phase = 'charSelect'; return;
    }
    if (cx >= COLOR_BTN.x && cx < COLOR_BTN.x + COLOR_BTN.w &&
        cy >= COLOR_BTN.y && cy < COLOR_BTN.y + COLOR_BTN.h) {
      phase = 'colorSelect'; return;
    }
    if (cx >= LEVELS_BTN.x && cx < LEVELS_BTN.x + LEVELS_BTN.w &&
        cy >= LEVELS_BTN.y && cy < LEVELS_BTN.y + LEVELS_BTN.h) {
      document.getElementById('levelFileInput').click(); return;
    }
    if (cx >= RESUME_BTN.x && cx < RESUME_BTN.x + RESUME_BTN.w &&
        cy >= RESUME_BTN.y && cy < RESUME_BTN.y + RESUME_BTN.h) {
      phase = 'playing'; setBgMusicVolume(1);
    }
  }
});

canvas.addEventListener('wheel', e => {
  if (phase !== 'charSelect') return;
  const CELL = 42, GAP = 4, COLS = 10, SVH = 350;
  const ROWS = Math.ceil(EMOJI_OPTIONS.length / COLS);
  const totalH = ROWS * (CELL + GAP) - GAP;
  const maxS = Math.max(0, totalH - SVH);
  charSelectScroll = Math.max(0, Math.min(maxS, charSelectScroll + e.deltaY * 0.7));
  e.preventDefault();
}, { passive: false });

document.getElementById('levelFileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const loaded = JSON.parse(ev.target.result);
      if (!Array.isArray(loaded) || loaded.length === 0) throw new Error('expected a non-empty array');
      levels = loaded;
      lvlIdx = 0;
      phase = 'playing';
      resetPlayer();
    } catch (err) {
      alert('Could not load levels: ' + err.message);
    }
  };
  reader.readAsText(file);
  this.value = ''; // allow re-loading the same file
});

function advanceLevel() {
  lvlIdx++;
  if (lvlIdx >= levels.length) { phase = 'win'; playWin(); }
  else { phase = 'playing'; resetPlayer(); }
}

// ─── AABB ────────────────────────────────────────────────────────────────────
function overlaps(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// Returns true if point (x,y) is inside the spike triangle at (sx,sy).
// Triangle: tip=(sx+SW/2, sy), base-left=(sx, sy+SH), base-right=(sx+SW, sy+SH).
function pointInSpike(x, y, sx, sy) {
  if (y < sy || y > sy + SH) return false;
  const t = (y - sy) / SH;          // 0 at tip, 1 at base
  const half = (SW / 2) * t;
  const cx = sx + SW / 2;
  return x >= cx - half && x <= cx + half;
}

// Tests a 3×3 grid of sample points on the (slightly shrunk) player rect
// against the spike triangle — far more accurate than a rectangle check.
function hitsSpike(s) {
  const px = player.x + 3, py = player.y + 4;
  const pw = PW - 6,        ph = PH - 4;
  if (px + pw <= s.x || px >= s.x + SW || py + ph <= s.y || py >= s.y + SH) return false;
  for (let xi = 0; xi <= 2; xi++) {
    for (let yi = 0; yi <= 2; yi++) {
      if (pointInSpike(px + xi * pw / 2, py + yi * ph / 2, s.x, s.y)) return true;
    }
  }
  return false;
}

// ─── Update ──────────────────────────────────────────────────────────────────
let last = 0;
function update(dt) {
  if (phase !== 'playing') return;
  const lv = levels[lvlIdx];

  // Timers
  if (player.coyote  > 0) player.coyote  -= dt;
  if (player.buffer  > 0) player.buffer  -= dt;

  // Horizontal
  const goL = keys['ArrowLeft']  || keys['KeyA'];
  const goR = keys['ArrowRight'] || keys['KeyD'];
  if (goL)        player.vx = Math.max(player.vx - ACCEL, -MAX_SPEED);
  else if (goR)   player.vx = Math.min(player.vx + ACCEL,  MAX_SPEED);
  else            player.vx *= FRICTION;
  if (Math.abs(player.vx) < 0.1) player.vx = 0;

  // Gravity
  player.vy = Math.min(player.vy + GRAVITY, 12); // cap below platform height to prevent tunneling

  // ── Move X, resolve ──
  player.x += player.vx;
  player.x = Math.max(0, Math.min(W - PW, player.x));
  for (const p of lv.platforms) {
    if (overlaps(player.x, player.y, PW, PH, p.x, p.y, p.w, p.h)) {
      if (player.vx > 0) { player.x = p.x - PW; player.vx = 0; }
      else if (player.vx < 0) { player.x = p.x + p.w; player.vx = 0; }
    }
  }

  // ── Move Y, resolve ──
  const wasGrounded = player.grounded;
  player.grounded = false;
  const preVy = player.vy;
  player.y += player.vy;

  for (const p of lv.platforms) {
    if (!overlaps(player.x, player.y, PW, PH, p.x, p.y, p.w, p.h)) continue;
    if (player.vy >= 0) {
      // landing on top
      player.y = p.y - PH;
      player.vy = 0;
      player.grounded = true;
    } else {
      // bonking ceiling
      player.y = p.y + p.h;
      player.vy = 0;
    }
  }

  // Coyote time
  if (wasGrounded && !player.grounded) player.coyote = COYOTE_MS;
  if (!wasGrounded && player.grounded && preVy > 2.5) playLand();

  // Jump (buffered + coyote)
  if (player.buffer > 0 && (player.grounded || player.coyote > 0)) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
    player.buffer = 0;
    player.coyote = 0;
    playJump();
  }

  // Fall into void
  if (player.y > H + 60) { playDeath(); resetPlayer(); return; }

  // ── Spike collision (triangle-accurate) ──
  for (const s of lv.spikes) {
    if (hitsSpike(s)) { playDeath(); resetPlayer(); return; }
  }

  // ── Flag collision ──
  const f = lv.flag;
  if (overlaps(player.x, player.y, PW, PH, f.x, f.y, 32, 40)) {
    phase = 'complete';
    completeTimer = 1400;
    playFlag();
  }
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function drawBg() {
  const [c1, c2] = levels[lvlIdx].bg;
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, c1); g.addColorStop(1, c2);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Stars on dark levels (6-10)
  if (lvlIdx >= 5) {
    const allStars = [
      [45,22],[125,10],[205,45],[285,16],[355,36],[435,8],[515,40],[600,20],[680,52],[752,28],
      [78,70],[165,84],[255,62],[345,80],[428,55],[508,75],[588,92],[665,66],[738,82],
      [28,108],[118,98],[198,116],[278,103],[368,122],[458,96],[548,110],[638,100],[718,118],[778,106],
      [92,38],[172,28],[248,58],[328,12],[408,48],[488,22],[568,60],[648,32],[728,68],[22,52],
    ];
    const count = Math.min(allStars.length, 10 + (lvlIdx - 5) * 8);
    ctx.fillStyle = `rgba(255,255,255,${0.55 + (lvlIdx - 5) * 0.06})`;
    for (let i = 0; i < count; i++) ctx.fillRect(allStars[i][0], allStars[i][1], 2, 2);
  }
}

function drawPlatforms() {
  for (const p of levels[lvlIdx].platforms) {
    const isGround = p.h > 14;
    ctx.fillStyle = isGround ? (customGroundColor ?? p.c) : (customPlatformColor ?? p.c);
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(p.x, p.y, p.w, 3);
  }
}

function drawSpikes() {
  ctx.fillStyle = customSpikeColor;
  for (const s of levels[lvlIdx].spikes) {
    ctx.beginPath();
    ctx.moveTo(s.x,        s.y + SH);
    ctx.lineTo(s.x + SW/2, s.y);
    ctx.lineTo(s.x + SW,   s.y + SH);
    ctx.closePath();
    ctx.fill();
  }
}

function drawFlag() {
  const f = levels[lvlIdx].flag;
  ctx.font = '38px serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('🚩', f.x, f.y);
}

function drawPlayer() {
  ctx.font = `${PH + 4}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const cx = player.x + PW / 2;
  if (player.vx < -0.4) {
    ctx.save();
    ctx.scale(-1, 1);
    ctx.fillText(playerEmoji, -cx, player.y);
    ctx.restore();
  } else {
    ctx.fillText(playerEmoji, cx, player.y);
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.roundRect(10, 10, 118, 32, 6);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(`Level ${lvlIdx + 1} / ${levels.length}`, 20, 26);

  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.roundRect(PAUSE_BTN.x, PAUSE_BTN.y, PAUSE_BTN.w, PAUSE_BTN.h, 6);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⏸', PAUSE_BTN.x + PAUSE_BTN.w / 2, PAUSE_BTN.y + PAUSE_BTN.h / 2);
}

function drawPauseMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 48px sans-serif';
  ctx.fillText('Paused', W / 2, 48);

  // Character preview
  ctx.font = '60px serif';
  ctx.fillText(playerEmoji, W / 2, 118);

  const selName = EMOJI_NAMES[EMOJI_OPTIONS.indexOf(playerEmoji)] ?? '';
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '14px sans-serif';
  ctx.fillText(selName, W / 2, 164);

  function pauseBtn(btn, bg, border, label, color) {
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 8); ctx.fill();
    ctx.strokeStyle = border; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 8); ctx.stroke();
    ctx.fillStyle = color;
    ctx.font = 'bold 17px sans-serif';
    ctx.fillText(label, W / 2, btn.y + btn.h / 2);
  }

  pauseBtn(CHAR_BTN,   'rgba(255,215,0,0.14)',   'rgba(255,215,0,0.55)',   'Choose Character', '#FFD700');
  pauseBtn(COLOR_BTN,  'rgba(100,200,255,0.14)', 'rgba(100,200,255,0.55)', 'Color Customizer', '#6CD8FF');
  pauseBtn(LEVELS_BTN, 'rgba(160,255,160,0.14)', 'rgba(160,255,160,0.55)', 'Load Levels JSON…', '#90EE90');
  pauseBtn(RESUME_BTN, 'rgba(255,255,255,0.13)', 'rgba(255,255,255,0.38)', 'Resume', '#FFF');

  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.font = '14px sans-serif';
  ctx.fillText('Press ESC to resume', W / 2, RESUME_BTN.y + RESUME_BTN.h + 22);
}

function drawOverlay(title, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 52px sans-serif';
  ctx.fillText(title, W/2, H/2 - 28);
  ctx.fillStyle = '#DDD';
  ctx.font = '22px sans-serif';
  ctx.fillText(sub, W/2, H/2 + 28);
}

function drawTitleScreen() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#87CEEB');
  g.addColorStop(1, '#C9E8FF');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#4A7C2F';
  ctx.fillRect(0, 390, W, 60);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(0, 390, W, 3);

  // Decorative platforms
  for (const p of [
    { x: 60,  y: 320, w: 140, c: '#6B4226' },
    { x: 330, y: 272, w: 140, c: '#8B4513' },
    { x: 600, y: 320, w: 140, c: '#6B4226' },
  ]) {
    ctx.fillStyle = p.c;
    ctx.fillRect(p.x, p.y, p.w, 14);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(p.x, p.y, p.w, 3);
  }

  // Penguin on left platform — bouncing
  const bounce = -Math.abs(Math.sin(Date.now() / 420)) * 22;
  ctx.font = '36px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('🐧', 130, 284 + bounce);

  // Flag on right platform
  ctx.font = '38px serif';
  ctx.fillText('🚩', 670, 282);

  // Title shadow
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 72px sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillText('Platform Party', W / 2 + 4, 124);

  // Title
  ctx.fillStyle = '#FFD700';
  ctx.fillText('Platform Party', W / 2, 120);

  // Divider
  ctx.fillStyle = 'rgba(255,215,0,0.45)';
  ctx.fillRect(W / 2 - 190, 160, 380, 2);

  // Blinking prompt
  const blink = Math.floor(Date.now() / 600) % 2 === 0;
  ctx.font = '22px sans-serif';
  ctx.fillStyle = blink ? '#FFF' : 'rgba(255,255,255,0.30)';
  ctx.fillText('Press any key to start', W / 2, 196);
}

function drawCharSelect() {
  const CELL = 42, GAP = 4, COLS = 10;
  const ROWS = Math.ceil(EMOJI_OPTIONS.length / COLS);
  const totalH = ROWS * (CELL + GAP) - GAP;
  const gridLeft = (W - (COLS * CELL + (COLS - 1) * GAP)) / 2;
  const STOP = 50, SVH = 350; // scroll area top & visible height
  const maxS = Math.max(0, totalH - SVH);

  ctx.fillStyle = 'rgba(0,0,0,0.90)';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText('Choose Character', W / 2 - 40, 26);
  // Current selection in title bar
  const selName = EMOJI_NAMES[EMOJI_OPTIONS.indexOf(playerEmoji)] ?? '';
  ctx.font = '20px serif';
  ctx.textAlign = 'right';
  ctx.fillText(playerEmoji, W - 110, 26);
  ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText(selName, W - 86, 26);

  // Clip to scroll area
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, STOP, W - 22, SVH);
  ctx.clip();

  for (let i = 0; i < EMOJI_OPTIONS.length; i++) {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const ex = gridLeft + col * (CELL + GAP);
    const ey = STOP + row * (CELL + GAP) - charSelectScroll;
    if (ey + CELL < STOP || ey > STOP + SVH) continue;

    const sel = EMOJI_OPTIONS[i] === playerEmoji;
    ctx.fillStyle = sel ? 'rgba(255,215,0,0.35)' : 'rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.roundRect(ex, ey, CELL, CELL, 5); ctx.fill();
    if (sel) {
      ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(ex, ey, CELL, CELL, 5); ctx.stroke();
    }
    ctx.font = '26px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(EMOJI_OPTIONS[i], ex + CELL / 2, ey + CELL / 2);
  }
  ctx.restore();

  // Scrollbar track
  const sbX = W - 14, sbH = SVH;
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.beginPath(); ctx.roundRect(sbX, STOP, 6, sbH, 3); ctx.fill();
  // Scrollbar thumb
  if (maxS > 0) {
    const thumbH = Math.max(28, sbH * SVH / totalH);
    const thumbY = STOP + (charSelectScroll / maxS) * (sbH - thumbH);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath(); ctx.roundRect(sbX, thumbY, 6, thumbH, 3); ctx.fill();
  }

  // Divider
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(0, STOP + SVH, W, 1);

  // Back button
  const bx = W/2 - 80, by = 406, bw = 160, bh = 34;
  ctx.fillStyle = 'rgba(255,255,255,0.11)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.30)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.stroke();
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('← Back', W / 2, by + bh / 2);

  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.font = '13px sans-serif';
  ctx.fillText('ESC to go back  •  scroll to browse', W / 2, by + bh + 18);
}

function drawColorSelect() {
  const SWATCH = 34, GAP = 3;
  const PLAT_COLS = 8, GROUND_COLS = 6, SPIKE_COLS = 6;
  const platStartX   = Math.round((W - (PLAT_COLS   * SWATCH + (PLAT_COLS   - 1) * GAP)) / 2);
  const groundStartX = Math.round((W - (GROUND_COLS * SWATCH + (GROUND_COLS - 1) * GAP)) / 2);
  const spikeStartX  = groundStartX;
  const ROW_H = SWATCH + GAP;

  const platStartY    = 50;
  const groundHeaderY = platStartY + 2 * ROW_H + 12;
  const groundStartY  = groundHeaderY + 14;
  const spikeHeaderY  = groundStartY + 2 * ROW_H + 12;
  const spikeStartY   = spikeHeaderY + 14;
  const backY         = spikeStartY  + 2 * ROW_H + 14;

  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#6CD8FF';
  ctx.font = 'bold 24px sans-serif';
  ctx.fillText('Color Customizer', W / 2, 22);

  function drawSwatchRow(options, cols, startX, startY, currentVal) {
    for (let i = 0; i < options.length; i++) {
      const sx = startX + (i % cols) * (SWATCH + GAP);
      const sy = startY + Math.floor(i / cols) * ROW_H;
      const color = options[i];
      const selected = currentVal === color;

      if (color === null) {
        const g = ctx.createLinearGradient(sx, sy, sx + SWATCH, sy + SWATCH);
        g.addColorStop(0, '#4A7C2F'); g.addColorStop(0.5, '#6B4226'); g.addColorStop(1, '#3D1A7A');
        ctx.fillStyle = g;
      } else {
        ctx.fillStyle = color;
      }
      ctx.beginPath(); ctx.roundRect(sx, sy, SWATCH, SWATCH, 4); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(sx, sy, SWATCH, SWATCH, 4); ctx.stroke();

      if (color === null) {
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Default', sx + SWATCH / 2, sy + SWATCH / 2);
      }
      if (selected) {
        ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.roundRect(sx, sy, SWATCH, SWATCH, 4); ctx.stroke();
      }
    }
  }

  function sectionHeader(label, x, y) {
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x, y);
  }

  sectionHeader('PLATFORM COLOR (floating)', platStartX, platStartY - 12);
  drawSwatchRow(PLATFORM_COLOR_OPTIONS, PLAT_COLS, platStartX, platStartY, customPlatformColor);

  sectionHeader('GROUND COLOR', groundStartX, groundHeaderY);
  drawSwatchRow(GROUND_COLOR_OPTIONS, GROUND_COLS, groundStartX, groundStartY, customGroundColor);

  sectionHeader('SPIKE COLOR', spikeStartX, spikeHeaderY);
  drawSwatchRow(SPIKE_COLOR_OPTIONS, SPIKE_COLS, spikeStartX, spikeStartY, customSpikeColor);

  // Back button
  const bbx = W / 2 - 80, bbw = 160, bbh = 30;
  ctx.fillStyle = 'rgba(255,255,255,0.11)';
  ctx.beginPath(); ctx.roundRect(bbx, backY, bbw, bbh, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.30)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(bbx, backY, bbw, bbh, 8); ctx.stroke();
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('← Back', W / 2, backY + bbh / 2);

  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.font = '13px sans-serif';
  ctx.fillText('ESC to go back', W / 2, backY + bbh + 16);
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min(ts - last, 50);
  last = ts;

  if (phase === 'title') {
    drawTitleScreen();
    requestAnimationFrame(loop);
    return;
  }

  if (phase === 'charSelect') {
    drawBg(); drawPlatforms(); drawSpikes(); drawFlag(); drawPlayer();
    drawCharSelect();
    requestAnimationFrame(loop);
    return;
  }

  if (phase === 'colorSelect') {
    drawBg(); drawPlatforms(); drawSpikes(); drawFlag(); drawPlayer();
    drawColorSelect();
    requestAnimationFrame(loop);
    return;
  }

  if (phase === 'complete') {
    completeTimer -= dt;
    if (completeTimer < 0) completeTimer = 0;
  }

  update(dt);

  drawBg();
  drawPlatforms();
  drawSpikes();
  drawFlag();
  drawPlayer();
  drawHUD();

  if (phase === 'complete') {
    const hint = completeTimer > 0 ? '' : 'Press any key to continue';
    drawOverlay('Level Complete!', hint);
  }
  if (phase === 'win') {
    drawOverlay('You Win! 🎉', 'Press any key to play again');
  }
  if (phase === 'paused') drawPauseMenu();

  requestAnimationFrame(loop);
}

resetPlayer();
requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });
</script>
